<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AAIRE Co. Logo Preview</title>
  <style>
    body {
      margin: 0;
      padding: 40px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
    }
    h1 {
      color: #0d1b2a;
      margin-bottom: 40px;
    }
    .logo-section {
      background: white;
      padding: 40px;
      margin-bottom: 30px;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .logo-section h2 {
      color: #0d1b2a;
      margin-bottom: 20px;
      font-size: 18px;
    }
    .backgrounds {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .bg-box {
      padding: 30px;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .bg-white { background: white; border: 1px solid #e0e0e0; }
    .bg-navy { background: #0d1b2a; }
    .bg-cream { background: #f7f5f0; }
    .bg-dark { background: #1a1a1a; }
  </style>
</head>
<body>
  <div class="container">
    <h1>AAIRE Co. Logo Preview</h1>

    <div class="logo-section">
      <h2>Original Logo (SVG Trace)</h2>
      <div class="backgrounds">
        <div class="bg-white">
          <img src="/images/logos/aaire-logo-original.svg" alt="Original Logo SVG" style="height: 200px;">
        </div>
        <div class="bg-cream">
          <img src="/images/logos/aaire-logo-original.svg" alt="Original Logo SVG" style="height: 200px;">
        </div>
      </div>
    </div>

    <div class="logo-section">
      <h2>Horizontal Logo (Navigation)</h2>
      <div class="backgrounds">
        <div class="bg-white">
          <img src="/images/logos/aaire-logo-horizontal.svg" alt="Horizontal Logo on White" style="height: 60px;">
        </div>
        <div class="bg-navy">
          <img src="/images/logos/aaire-logo-horizontal.svg" alt="Horizontal Logo on Navy" style="height: 60px;">
        </div>
        <div class="bg-cream">
          <img src="/images/logos/aaire-logo-horizontal.svg" alt="Horizontal Logo on Cream" style="height: 60px;">
        </div>
        <div class="bg-dark">
          <img src="/images/logos/aaire-logo-horizontal.svg" alt="Horizontal Logo on Dark" style="height: 60px;">
        </div>
      </div>
    </div>

    <div class="logo-section">
      <h2>Stacked Logo (Square Spaces)</h2>
      <div class="backgrounds">
        <div class="bg-white">
          <img src="/images/logos/aaire-logo-stacked.svg" alt="Stacked Logo on White" style="height: 140px;">
        </div>
        <div class="bg-navy">
          <img src="/images/logos/aaire-logo-stacked.svg" alt="Stacked Logo on Navy" style="height: 140px;">
        </div>
        <div class="bg-cream">
          <img src="/images/logos/aaire-logo-stacked.svg" alt="Stacked Logo on Cream" style="height: 140px;">
        </div>
        <div class="bg-dark">
          <img src="/images/logos/aaire-logo-stacked.svg" alt="Stacked Logo on Dark" style="height: 140px;">
        </div>
      </div>
    </div>

    <div class="logo-section">
      <h2>Size Tests - Horizontal</h2>
      <div style="display: flex; gap: 30px; align-items: center; flex-wrap: wrap; padding: 20px; background: #f7f5f0; border-radius: 4px;">
        <img src="/images/logos/aaire-logo-horizontal.svg" alt="Small" style="height: 30px;">
        <img src="/images/logos/aaire-logo-horizontal.svg" alt="Medium" style="height: 60px;">
        <img src="/images/logos/aaire-logo-horizontal.svg" alt="Large" style="height: 90px;">
      </div>
    </div>
  </div>
</body>
</html>
