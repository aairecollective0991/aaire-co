<svg width="240" height="60" viewBox="0 0 240 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Icon with Woodpecker Silhouette -->
  <g id="icon">
    <!-- Outer circle -->
    <circle cx="30" cy="30" r="28" stroke="#C9A96E" stroke-width="2" fill="none"/>

    <!-- Triangle A at top -->
    <path d="M 30 8 L 19 32 L 41 32 Z" stroke="#C9A96E" stroke-width="2" fill="none"/>

    <!-- Geometric Woodpecker Silhouette (angular/faceted bird) -->
    <!-- Head pointing right -->
    <path d="M 32 18 L 38 20 L 40 18 L 38 16 L 32 18 Z" fill="#C9A96E" stroke="#C9A96E" stroke-width="0.5"/>

    <!-- Body/chest -->
    <path d="M 30 18 L 32 18 L 32 28 L 28 30 L 26 28 L 28 20 Z" fill="#C9A96E" stroke="#C9A96E" stroke-width="1"/>

    <!-- Wings (angular facets) -->
    <path d="M 32 20 L 38 22 L 36 26 L 32 24 Z" fill="#C9A96E" opacity="0.8" stroke="#C9A96E" stroke-width="0.8"/>
    <path d="M 32 24 L 36 26 L 34 30 L 32 28 Z" fill="#C9A96E" opacity="0.7" stroke="#C9A96E" stroke-width="0.8"/>

    <!-- Tail feathers (angular) -->
    <path d="M 26 28 L 28 30 L 26 34 L 22 32 Z" fill="#C9A96E" opacity="0.8" stroke="#C9A96E" stroke-width="0.8"/>
    <path d="M 28 30 L 32 28 L 30 34 L 26 34 Z" fill="#C9A96E" opacity="0.7" stroke="#C9A96E" stroke-width="0.8"/>

    <!-- Hammer at bottom -->
    <g transform="translate(25, 40)">
      <rect x="4" y="0" width="2" height="10" fill="#C9A96E"/>
      <rect x="0" y="0" width="10" height="4" rx="1" fill="#C9A96E"/>
    </g>
  </g>

  <!-- Text: AAIRE Co. -->
  <text x="75" y="38" font-family="Playfair Display, serif" font-size="28" font-weight="700" fill="#0d1b2a" letter-spacing="-0.5">
    AAIRE Co.
  </text>
</svg>
