<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer Circle -->
  <circle cx="100" cy="100" r="95" stroke="#000000" stroke-width="3" fill="none"/>

  <!-- Large Triangle A (left side) -->
  <path d="M 100 15 L 40 110 L 65 110 L 100 40 L 135 110 L 160 110 Z" stroke="#000000" stroke-width="2.5" fill="none"/>

  <!-- Horizontal Beam/Perch -->
  <line x1="45" y1="110" x2="155" y2="110" stroke="#000000" stroke-width="3"/>

  <!-- Woodpecker Silhouette (geometric/angular facets) -->
  <g id="woodpecker" stroke="#000000" stroke-width="2" fill="none">
    <!-- Head/Beak -->
    <path d="M 100 55 L 115 60 L 125 55 L 120 50 L 115 52"/>
    <path d="M 115 52 L 120 50 L 125 55"/>

    <!-- Neck/Upper Body -->
    <path d="M 100 55 L 105 65 L 100 75"/>
    <path d="M 105 65 L 115 60"/>

    <!-- Chest/Wing Area (geometric facets) -->
    <path d="M 100 75 L 110 80 L 115 70"/>
    <path d="M 110 80 L 120 75 L 115 70"/>
    <path d="M 110 80 L 105 90"/>
    <path d="M 120 75 L 125 80 L 120 85"/>
    <path d="M 105 90 L 110 95 L 100 105"/>
    <path d="M 110 95 L 115 90 L 110 80"/>

    <!-- Lower Body/Tail Feathers (angular) -->
    <path d="M 100 105 L 95 120"/>
    <path d="M 100 105 L 105 115"/>
    <path d="M 95 120 L 100 130"/>
    <path d="M 105 115 L 100 130"/>
    <path d="M 100 130 L 95 145"/>
    <path d="M 100 130 L 105 140"/>
    <path d="M 95 145 L 90 155"/>
    <path d="M 105 140 L 100 150"/>
    <path d="M 100 150 L 95 145"/>
  </g>

  <!-- Hammer (bottom right) -->
  <g id="hammer" stroke="#000000" stroke-width="2.5" fill="none">
    <!-- Handle -->
    <line x1="140" y1="130" x2="140" y2="165"/>
    <!-- Hammer Head -->
    <path d="M 130 125 L 150 125 L 150 135 L 130 135 Z"/>
    <!-- Claw part -->
    <path d="M 145 135 Q 155 140 155 150 Q 155 155 150 158" stroke-width="2"/>
  </g>

  <!-- Base blocks under beam -->
  <rect x="48" y="110" width="15" height="8" stroke="#000000" stroke-width="2" fill="none"/>
  <rect x="137" y="110" width="15" height="8" stroke="#000000" stroke-width="2" fill="none"/>
</svg>
